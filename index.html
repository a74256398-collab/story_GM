            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`已成功下載 ${fileName}！`);
        }

        function copyScript(btn) {
            const scriptText = document.getElementById('golden-script').innerText;
            navigator.clipboard.writeText(scriptText).then(() => {
                showToast('話術已複製到剪貼簿！');
                const iconCopy = btn.querySelector('.ph-copy');
                const iconCheck = btn.querySelector('.ph-check');
                if(iconCopy && iconCheck) {
                    iconCopy.classList.add('hidden');
                    iconCheck.classList.remove('hidden');
                    setTimeout(() => {
                        iconCopy.classList.remove('hidden');
                        iconCheck.classList.add('hidden');
                    }, 2000);
                }
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = scriptText;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast('話術已複製到剪貼簿！');
                } catch (err) {
                    showToast('複製失敗，請手動選取複製。');
                }
                document.body.removeChild(textArea);
            });
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gm-primary text-white px-6 py-3 rounded-2xl shadow-xl font-bold text-sm z-50 fade-in flex items-center gap-2 border-2 border-gm-secondary/30';
            toast.innerHTML = `<i class="ph-bold ph-check-circle text-gm-accent text-xl"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        window.onload = () => {
            renderSidebar();
            render();
        };
    </script>
</body>
</html>
